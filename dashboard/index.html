<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silver Ash Harbor — 价格追踪看板</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="logo">&#9969; Silver Ash Harbor</h1>
      <span class="subtitle">多品牌价格监控看板</span>
    </div>
    <div class="header-right">
      <span id="last-update" class="last-update">加载中...</span>
      <button id="btn-crawl" class="btn btn-primary" title="手动触发爬取">
        &#8635; 立即爬取
      </button>
    </div>
  </header>

  <!-- Dashboard Cards -->
  <section class="dashboard-cards" id="dashboard-cards">
    <div class="card">
      <div class="card-icon">&#127991;</div>
      <div class="card-value" id="stat-brands">-</div>
      <div class="card-label">品牌数</div>
    </div>
    <div class="card">
      <div class="card-icon">&#128230;</div>
      <div class="card-value" id="stat-products">-</div>
      <div class="card-label">追踪产品</div>
    </div>
    <div class="card">
      <div class="card-icon">&#128200;</div>
      <div class="card-value" id="stat-changes">-</div>
      <div class="card-label">24h 价格变动</div>
    </div>
    <div class="card">
      <div class="card-icon">&#128339;</div>
      <div class="card-value" id="stat-last-crawl">-</div>
      <div class="card-label">最近爬取</div>
    </div>
  </section>

  <!-- Brand Tabs -->
  <nav class="tabs" id="brand-tabs">
    <button class="tab active" data-brand="all">&#9733; 全部品牌</button>
    <button class="tab" data-brand="changes">&#9888; 价格变动 <span class="tab-badge" id="changes-badge" style="display:none">0</span></button>
  </nav>

  <!-- Product Table -->
  <section class="table-section">
    <div class="table-toolbar">
      <input type="text" id="search-input" class="search-input" placeholder="搜索产品...">
      <span class="result-count" id="result-count"></span>
    </div>

    <div class="table-wrapper">
      <table id="product-table">
        <thead>
          <tr>
            <th>产品</th>
            <th>品牌</th>
            <th>价格</th>
            <th>上次价格</th>
            <th>变动</th>
            <th>更新时间</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr class="empty-row">
            <td colspan="6">
              <div class="empty-state">
                <div class="empty-icon">&#128269;</div>
                <p>暂无数据，添加品牌并执行爬取即可开始追踪</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- Crawl Log Panel -->
  <details class="log-panel">
    <summary>爬取历史 <span class="log-badge" id="log-badge">0</span></summary>
    <div class="log-list" id="log-list">
      <p class="log-empty">暂无爬取记录</p>
    </div>
  </details>

</div>

<script src="/js/app.js"></script>
</body>
</html>
