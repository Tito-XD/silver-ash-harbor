<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silver Ash Harbor — Price Tracker</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="logo">&#9969; Silver Ash Harbor</h1>
      <span class="subtitle">Multi-Brand Price Monitor</span>
    </div>
    <div class="header-right">
      <span id="last-update" class="last-update">Loading...</span>
      <button id="btn-crawl" class="btn btn-primary" title="Trigger manual crawl">
        &#8635; Crawl Now
      </button>
    </div>
  </header>

  <!-- Dashboard Cards -->
  <section class="dashboard-cards" id="dashboard-cards">
    <div class="card">
      <div class="card-icon">&#127991;</div>
      <div class="card-value" id="stat-brands">-</div>
      <div class="card-label">Brands</div>
    </div>
    <div class="card">
      <div class="card-icon">&#128230;</div>
      <div class="card-value" id="stat-products">-</div>
      <div class="card-label">Products Tracked</div>
    </div>
    <div class="card">
      <div class="card-icon">&#128200;</div>
      <div class="card-value" id="stat-changes">-</div>
      <div class="card-label">Price Changes (24h)</div>
    </div>
    <div class="card">
      <div class="card-icon">&#128339;</div>
      <div class="card-value" id="stat-last-crawl">-</div>
      <div class="card-label">Last Crawl</div>
    </div>
  </section>

  <!-- Brand Tabs -->
  <nav class="tabs" id="brand-tabs">
    <button class="tab active" data-brand="all">&#9733; All Brands</button>
  </nav>

  <!-- Product Table -->
  <section class="table-section">
    <div class="table-toolbar">
      <input type="text" id="search-input" class="search-input" placeholder="Search products...">
      <span class="result-count" id="result-count"></span>
    </div>

    <div class="table-wrapper">
      <table id="product-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Brand</th>
            <th>Price</th>
            <th>Previous</th>
            <th>Change</th>
            <th>Last Updated</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr class="empty-row">
            <td colspan="6">
              <div class="empty-state">
                <div class="empty-icon">&#128269;</div>
                <p>No data yet. Add brands and run a crawl to start tracking prices.</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- Crawl Log Panel -->
  <details class="log-panel">
    <summary>Crawl History <span class="log-badge" id="log-badge">0</span></summary>
    <div class="log-list" id="log-list">
      <p class="log-empty">No crawl history yet.</p>
    </div>
  </details>

</div>

<script src="/js/app.js"></script>
</body>
</html>
